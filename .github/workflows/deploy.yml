name: Deploy to shared hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-shared-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          port="${SSH_PORT:-22}"
          ssh-keyscan -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
        run: |
          port="${SSH_PORT:-22}"
          ssh_opts="-i ~/.ssh/deploy_key -p ${port} -o StrictHostKeyChecking=accept-new -o BatchMode=yes"

          rsync -avz \
            --omit-dir-times \
            --no-perms --no-owner --no-group \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            -e "ssh ${ssh_opts}" \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_REMOTE_PATH}/"